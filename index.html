<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swim3D - Study the perfect freestyle technique</title>

  <!-- Favicon related -->
  <link rel="icon" type="image/png" href="./img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
  <link rel="shortcut icon" href="./img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png" />
  <link rel="manifest" href="./img/site.webmanifest" />

  <!-- Style related -->
  <link rel='stylesheet' type='text/css' href='css/site.css' />

  <!-- Import Maps: The modern way to use modules without a build step -->
  <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "stats": "https://unpkg.com/three@0.160.0/examples/jsm/libs/stats.module.js",
                "three-viewport-gizmo": "https://unpkg.com/three-viewport-gizmo@2.2.0/dist/three-viewport-gizmo.js"
            }
        }
    </script>

  <!-- Application script - MUST BE LAST since it depends on the other libraries -->
  <script src='js/site.js' type='module' defer></script>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#87CEEB"> <!-- Matches the Three.js sky color -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Swim3D">

  <!-- App Registration Script for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</head>

<body>
  <div id="loading">Loading 3D Model...</div>

  <!-- Control and settings buttons -->
  <div id="controls-container">
    <input type="range" class="progress-slider" min="0" max="1.11" step="0.01" value="0">

    <div class="controls-row">
      <button id="step-backward-btn" class="step-btn" title="Step backward 0.01s" aria-label="Step backward"></button>
      <button id="play-pause-btn" class="pause" title="Pause animation <Spacebar>" aria-label="Pause animation"></button>
      <button id="step-forward-btn" class="step-btn" title="Step forward 0.01s" aria-label="Step forward"></button>
      <button id="settings-btn" title="Settings" aria-label="Settings">
        <svg fill="currentColor" height="28" viewBox="0 0 24 24" width="28" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.08.62-.08.94s.03.64.08.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Settings Menu Popup -->
  <div id="settings-menu">
    <!-- Trace Hands -->
    <div class="setting-row">
      <div class="setting-label">
        <svg fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
          <path style="fill:none;stroke:currentColor;stroke-width:3;stroke-dasharray:none;stroke-opacity:1"
            d="M3.756 6.305c3.07-2.536 15.873.178 16.141 5.32.269 5.142-8.942 8.317-11.178 5.545S1.7 8.004 3.756 6.305Z" />
        </svg>
        <span>Trace Hands</span>
      </div>
      <label class="switch" title="Show/hide hand traces <t>">
        <input type="checkbox" id="trace-hands-toggle">
        <span class="slider round"></span>
      </label>
    </div>

    <!-- Water -->
    <div class="setting-row">
      <div class="setting-label">
        <svg height="24" preserveAspectRatio="xMidYMid" viewBox="0 0 18 18" width="24"
          xmlns="http://www.w3.org/2000/svg">
          <path
            style="fill:none;fill-opacity:1;fill-rule:nonzero;stroke:currentColor;stroke-width:.999641;stroke-linecap:square;stroke-dasharray:none;stroke-opacity:1"
            d="M.684 13.064s.685-1.158 1.353-1.164c1.17-.01 1.78 2.958 3.467 2.958 1.561 0 2.315-2.945 3.525-2.95 1.283-.006 1.848 2.95 3.563 2.95 1.746 0 2.414-2.988 3.46-2.979.567.005 1.263 1.178 1.263 1.178M.685 9.272s.684-1.158 1.352-1.164c1.17-.01 1.78 2.958 3.467 2.958 1.561 0 2.315-2.945 3.525-2.95 1.283-.006 1.848 2.95 3.563 2.95 1.746 0 2.414-2.988 3.46-2.98.567.006 1.263 1.18 1.263 1.18M.685 5.23s.684-1.159 1.352-1.165c1.17-.01 1.78 2.958 3.467 2.958 1.561 0 2.315-2.945 3.525-2.95 1.283-.006 1.848 2.95 3.563 2.95 1.746 0 2.414-2.988 3.46-2.979.567.005 1.263 1.179 1.263 1.179" />
        </svg>
        <span>Water</span>
      </div>
      <label class="switch" title="Show/hide water <w>">
        <input type="checkbox" id="waterToggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <!-- Playback Speed Label -->
    <div class="setting-row">
      <div class="setting-label">
        <svg fill="currentColor" height="24" viewBox="0 0 24 24" width="24">
          <path
            d="M12 1c1.44 0 2.87.28 4.21.83a11 11 0 0 1 3.45 2.27l-1.81 1.05A9 9 0 0 0 3 12a9 9 0 0 0 18-.00l-.01-.44a8.99 8.99 0 0 0-.14-1.20l1.81-1.05A11.00 11.00 0 0 1 10.51 22.9 11 11 0 0 1 12 1Zm7.08 6.25-7.96 3.25a1.74 1.74 0 1 0 1.73 2.99l6.8-5.26a.57.57 0 0 0-.56-.98Z">
          </path>
        </svg>
        <span>Playback Speed</span>
      </div>
    </div>

    <!-- Current Speed Display -->
    <div class="speed-display" id="current-speed-display">1.00x</div>

    <!-- Slider -->
    <div class="slider-row">
      <button class="slider-btn" id="speed-minus-btn">-</button>
      <input type="range" id="speed-slider" min="0.1" max="1" step="0.05" value="1">
      <button class="slider-btn" id="speed-plus-btn">+</button>
    </div>

    <!-- Preset Buttons -->
    <div class="preset-row">
      <button class="speed-preset" data-speed="0.1">0.1</button>
      <button class="speed-preset" data-speed="0.25">0.25</button>
      <button class="speed-preset" data-speed="0.5">0.5</button>
      <button class="speed-preset active" data-speed="1.0">1.0<br><span
          class="speed-label-normal">Standard</span></button>
    </div>
  </div>

</body>

</html>
