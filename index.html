<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swim3D - Study the perfect freestyle technique</title>

  <!-- Favicon related -->
  <link rel="icon" type="image/png" href="./img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
  <link rel="shortcut icon" href="./img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png" />
  <link rel="manifest" href="./img/site.webmanifest" />

  <!-- Style related -->
  <link rel='stylesheet' type='text/css' href='css/site.css' />

  <!-- Import Maps: The modern way to use modules without a build step -->
  <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "stats": "https://unpkg.com/three@0.160.0/examples/jsm/libs/stats.module.js",
                "three-viewport-gizmo": "https://unpkg.com/three-viewport-gizmo@2.2.0/dist/three-viewport-gizmo.js"
            }
        }
    </script>

  <!-- Application script - MUST BE LAST since it depends on the others -->
  <script src='js/site.js' type='module' defer></script>
</head>

<body>
  <div id="loading">Loading 3D Model...</div>

  <div id="controlsContainer">
    <div id="speedControlWrapper">
      <div id="speedMenu">
        <button class="speed-option" data-speed="0.1">0.1</button>
        <button class="speed-option" data-speed="0.25">0.25</button>
        <button class="speed-option" data-speed="0.5">0.5</button>
        <button class="speed-option active" data-speed="1.0">
          1.0<br><span class="speed-label-normal">Normal</span>
        </button>
      </div>

      <button id="speedToggleBtn" title="Playback Speed" aria-label="Toggle Playback Speed">
        <svg fill="currentColor" height="32" viewBox="0 0 24 24" width="32">
          <path
            d="M12 1c1.44 0 2.87.28 4.21.83a11 11 0 0 1 3.45 2.27l-1.81 1.05A9 9 0 0 0 3 12a9 9 0 0 0 18-.00l-.01-.44a8.99 8.99 0 0 0-.14-1.20l1.81-1.05A11.00 11.00 0 0 1 10.51 22.9 11 11 0 0 1 12 1Zm7.08 6.25-7.96 3.25a1.74 1.74 0 1 0 1.73 2.99l6.8-5.26a.57.57 0 0 0-.56-.98Z">
          </path>
        </svg>
      </button>
    </div>

    <button id="stepForwardBtn" class="step-btn" title="Step forward 0.01s" aria-label="Step forward 0.01s"></button>
    <button id="playPauseBtn" class="pause" title="Pause animation" aria-label="Pause animation"></button>
    <button id="stepBackwardBtn" class="step-btn" title="Step backward 0.01s" aria-label="Step backward 0.01s"></button>
    <button id="traceHandsBtn" title="Toggle Trace_Hands visibility" aria-label="Toggle Trace_Hands visibility">
      <svg fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
        <path style="fill:none;stroke:#000;stroke-width:3;stroke-dasharray:none;stroke-opacity:1"
          d="M3.756 6.305c3.07-2.536 15.873.178 16.141 5.32.269 5.142-8.942 8.317-11.178 5.545S1.7 8.004 3.756 6.305Z" />
      </svg>
    </button>
  </div>
</body>

</html>
